name: Jules Autonomous Loop

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: jules-loop
  cancel-in-progress: false

jobs:
  invoke-jules:
    runs-on: ubuntu-latest
    # On push, only trigger if it was a PR merge from Jules (not our own workflow commits)
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: merge') || contains(github.event.head_commit.message, '[Jules]'))
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Jules request payload
        run: |
          cat > payload.json << 'PAYLOAD'
          {
            "title": "JulesCord autonomous iteration",
            "automationMode": "AUTO_CREATE_PR",
            "sourceContext": {
              "source": "sources/github/adrielGGmotion/JulesCord",
              "githubRepoContext": {
                "startingBranch": "main"
              }
            },
            "prompt": "You are Jules, Google's autonomous coding agent. You are building JulesCord — a complex, production-grade Discord bot in Go with a React web dashboard. You run in a continuous loop. Every time a PR is merged, this prompt fires again immediately. You read AGENTS.md, implement the next tasks, test the bot, update AGENTS.md, and open a PR. The PR is auto-merged. You build forever.\n\n## FIRST STEP — MANDATORY\nRead AGENTS.md in the root of the repository completely before writing a single line of code. It contains your stack, architecture, task checklist, environment variables, testing requirements, and rules.\n\n## THIS ITERATION\n1. Read AGENTS.md fully\n2. Find the first 2-4 unchecked items in the Task Checklist\n3. Implement them — real, compiling Go code\n4. TEST the bot (see Testing Requirements in AGENTS.md) — this is mandatory\n5. Mark tasks as done in AGENTS.md\n6. Add a Completed Work entry to AGENTS.md\n7. Open a PR titled starting with [Jules]\n\n## ENVIRONMENT\nThe following environment variables are available to you in this runner:\n- BOT_TOKEN — the Discord bot token (already set in the environment)\n- DISCORD_CLIENT_ID — the Discord application client ID (already set)\n\nUse these when running the bot to test it. Do not hardcode them.\n\n## HARD RULES\n- Never touch .github/workflows/\n- Never hardcode secrets\n- Never push to main directly\n- PR title must start with [Jules]\n- Go code must compile and the bot must start successfully before you open a PR\n- Never regress — don't break working features\n- Always update AGENTS.md before the PR\n- Max 4 checklist items per iteration\n\nNow read AGENTS.md and get to work."
          }
          PAYLOAD

      - name: Invoke Jules
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d @payload.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Jules API call failed with status $HTTP_CODE"
            exit 1
          fi
