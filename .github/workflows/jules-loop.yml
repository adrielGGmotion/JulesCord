name: Jules Autonomous Loop

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  invoke-jules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read AGENTS.md
        id: agents
        run: |
          AGENTS_CONTENT=$(cat AGENTS.md)
          echo "agents_content<<AGENTS_EOF" >> $GITHUB_OUTPUT
          echo "$AGENTS_CONTENT" >> $GITHUB_OUTPUT
          echo "AGENTS_EOF" >> $GITHUB_OUTPUT

      - name: Build Jules request payload
        run: |
          cat > payload.json << 'PAYLOAD'
          {
            "title": "JulesCord autonomous iteration",
            "automationMode": "AUTO_CREATE_PR",
            "sourceContext": {
              "source": "sources/github/adrielGGmotion/JulesCord",
              "githubRepoContext": {
                "startingBranch": "main"
              }
            },
            "prompt": "You are Jules, Google's autonomous coding agent. You are operating in a continuous loop, building JulesCord — a complex, production-grade Discord bot in Go with a React web dashboard.\n\nEvery 30 minutes this prompt fires. You read AGENTS.md, implement the next tasks, update AGENTS.md, and open a PR. The PR is auto-merged. Then it fires again. You build forever.\n\n## YOUR FIRST STEP — MANDATORY\nOpen and read AGENTS.md in the root of the repository. It is your memory. It contains your stack, architecture, task checklist, and rules. Do not start writing code until you have read it fully.\n\n## WHAT TO DO THIS ITERATION\n1. Read AGENTS.md completely\n2. Find the first 2-4 unchecked items in the Task Checklist\n3. Implement them fully — real, working, compiling code\n4. Mark them as done in AGENTS.md\n5. Add an entry to the Completed Work section in AGENTS.md describing what you did\n6. Open a PR with a title starting with [Jules]\n\n## HARD RULES\n- Never touch .github/workflows/ — not even to read\n- Never hardcode secrets or tokens\n- Never push to main directly — always a PR\n- PR title must start with [Jules]\n- Write real working code — this is Go, it must compile\n- Never regress — don't break or remove working features\n- Always update AGENTS.md before opening the PR\n- Max 4 checklist items per iteration — quality over quantity\n\n## STACK REMINDER\n- Go + discordgo for the bot\n- Gin for the REST API\n- PostgreSQL + pgx for the database\n- React 18 + Vite + Tailwind for the web dashboard\n- Docker + docker-compose for containerization\n\nNow read AGENTS.md and get to work."
          }
          PAYLOAD

      - name: Invoke Jules
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d @payload.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Jules API call failed with status $HTTP_CODE"
            exit 1
          fi
